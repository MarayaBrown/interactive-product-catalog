<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Store - Catálogo de Productos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="index.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🌿</span>
                <h1>Jardín Store</h1>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar productos..." class="search-input">
                <span class="search-icon">🔍</span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="hero">
            <span class="showcase-label">UI Showcase</span>
            <h2>Catálogo de Productos</h2>
            <p>Demo de e-commerce con JavaScript vanilla — funcionalidad completa sin backend</p>
        </section>

        <div class="filter-info">
            <span class="filter-icon">🌱</span>
            <span id="product-count">4 productos</span>
        </div>

        <div id="articulos" class="products-grid">
        </div>

        <div id="no-results" class="no-results" style="display: none;">
            <span class="no-results-icon">🔍</span>
            <p>No products found</p>
        </div>
    </main>

    <footer class="footer">
        <p>© 2024 Jardín Store - Envíos a todo el país</p>
        <p class="footer-credit">Diseñado por <a href="https://github.com/MarayaBrown" target="_blank">María Brown</a></p>
    </footer>
</body>
</html>
